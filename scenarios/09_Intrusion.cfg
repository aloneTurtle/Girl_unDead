    [event]
        name=prestart
        [objectives]
            [objective]
                description= _ "Get as many units as possible through the castle's gate"
                condition=win
            [/objective]
            [objective]
                description= _ "Malica and the other heros fail to reach the gate"
                condition=lose
            [/objective]
            [objective]
                description= _ "Destruction of Malica"
                condition=lose
            [/objective]
            [objective]
                description= _ "Destruction of Poet"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Cyclos"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Stella"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Runt"
                condition=lose
            [/objective]

            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=no
                carryover_percentage=0
            [/gold_carryover]

            [note]
                description= _ "Malica must enter last."
            [/note]
            [note]
                description= _ "Maximum 23 units, including Malica, can enter the gate."
            [/note]
        [/objectives]

        [unstore_unit]
            variable=poet_store
            x,y=4,24
        [/unstore_unit]
        [clear_variable]
            name=poet_store
        [/clear_variable]

        [unstore_unit]
            variable=stella_store
            x,y=5,25
        [/unstore_unit]
        [clear_variable]
            name=stella_store
        [/clear_variable]

        [unstore_unit]
            variable=chibi_store
            x,y=3,25
        [/unstore_unit]
        [clear_variable]
            name=chibi_store
        [/clear_variable]

        [recall]
            side=1
            id=Cyclos
        [/recall]
        [recall]
            side=1
            id=Hendrich
        [/recall]
    [/event]

    [event]
        name=start
        # NorthWest
        {VARIABLE NW on}
        # NorthEast
        {VARIABLE NE on}
        # SouthWest
        {VARIABLE SW on}
        # SouthEast
        {VARIABLE SE on}

        [message]
            speaker=Poet
            message= _ "My Princess, we must enter the gate of the castle before morning."
        [/message]

        {HIGHLIGHT_IMAGE 24 4 items/gohere.png ()}

        [message]
            speaker=Malica
            message= _ "All right... How do you know about this castle."
        [/message]
        [message]
            speaker=Poet
            message= _ "Ah... I can't hear you say because it is too cold..."
        [/message]
        [message]
            speaker=Poet
            message= _ "Anyway the lighthouse lights are dazzling."
        [/message]
        [if]
            [have_unit]
                id=Hendrich
            [/have_unit]
            [then]
                [message]
                    speaker=Hendrich
                    message= _ "The great mage is protecting the castle with the fire of that lighthouse."
                [/message]
                [message]
                    speaker=Poet
                    message= _ "How?"
                [/message]
                [message]
                    speaker=Hendrich
                    message= _ "... Sorry, I've forgotten."
                [/message]
                [message]
                    speaker=Poet
                    message= _ "Damm. Poor mage is useless!"
                [/message]
            [/then]
        [/if]
    [/event]

#define DEATHLIGHT X Y VAR
    [item]
        x,y={X},{Y}
        image=items/brazier-lit4.png
        halo=halo/illuminates-aura.png
    [/item]

    # アンデッド破壊
    [event]
        name=moveto
        first_time_only=no
        [filter]
            id=Malica
            [filter_location]
                x,y={X},{Y}
                radius=1
            [/filter_location]
        [/filter]
        [if]
            [variable]
                name={VAR}
                equals=on
            [/variable]
            [then]
                [message]
                    speaker=Malica
                    message= _ "Sorry! I can't enter the gate!"
                [/message]
                [kill]
                    id=$unit.id
                    fire_event=no
                    animate=yes
                [/kill]
                [endlevel]
                    result=defeat
                [/endlevel]
            [/then]
        [/if]
    [/event]
    [event]
        name=moveto
        first_time_only=no
        [filter]
            id=Poet
            [filter_location]
                x,y={X},{Y}
                radius=1
            [/filter_location]
        [/filter]
        [if]
            [variable]
                name={VAR}
                equals=on
            [/variable]
            [then]
                [message]
                    speaker=Malica
                    message= _ "Poet! Don't disappear!"
                [/message]
                [kill]
                    id=$unit.id
                    fire_event=no
                    animate=yes
                [/kill]
                [endlevel]
                    result=defeat
                [/endlevel]
            [/then]
        [/if]
    [/event]
    [event]
        name=moveto
        first_time_only=no
        [filter]
            race=undead
            [filter_location]
                x,y={X},{Y}
                radius=1
            [/filter_location]
        [/filter]
        [if]
            [variable]
                name={VAR}
                equals=on
            [/variable]
            [then]
                [kill]
                    id=$unit.id
                    fire_event=no
                    animate=yes
                [/kill]
                [if]
                    [variable]
                        name=mage_message
                        equals=off
                    [/variable]
                    [else]
                        [message]
                            speaker=Hendrich
                            message= _ "Oh, I remember! We must put out the fire of all the lighthouses."
                        [/message]
                        [message]
                            speaker=Hendrich
                            message= _ "The undead that entered the castle will be burnt out by the sacred fire."
                        [/message]
                        {VARIABLE mage_message off}
                    [/else]
                [/if]
            [/then]
        [/if]
    [/event]
    [event]
        name=moveto
        [filter]
            side=1
            x,y={X},{Y}
        [/filter]
        [remove_item]
            x,y={X},{Y}
        [/remove_item]

        [item]
            x,y={X},{Y}
            image=items/brazier.png
        [/item]

        {VARIABLE {VAR} off}
    [/event]
#enddef

    {DEATHLIGHT 21 3 NW}
    {DEATHLIGHT 27 3 NE}
    {DEATHLIGHT 21 7 SW}
    {DEATHLIGHT 27 7 SE}

