        id=Malica
        type=Lady Lich
        controller=human
        team_name=undead
        user_team_name= _ "Malica"
        canrecruit=yes
        {GOLD 260 220 180}
        {INCOME 4 2 0}
        {FLAG_VARIANT undead}
        fog=yes
    [/side]

