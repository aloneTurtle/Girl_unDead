                [set_specials]
                    {WEAPON_SPECIAL_POISON}
                [/set_specials]
            [/effect]
            [effect]
                apply_to=attack
                name=thorns
                [set_specials]
                    {WEAPON_SPECIAL_BACKSTAB}
                [/set_specials]
            [/effect]
            [effect]
                apply_to=new_ability
                [abilities]
                    {ABILITY_SKIRMISHER}
                [/abilities]
            [/effect]
        [/object]
    [/event]

    [event]
        name=time over
        [if]
            [have_unit]
                id=Malica
            [/have_unit]
            [then]
                [message]
                    speaker=Malica
                    message= _ "Sorry! I can't enter the gate!"
                [/message]
                [endlevel]
                    result=defeat
                [/endlevel]
            [/then]
            [else]
                [endlevel]
                    result=victory
                    carryover_report=no
                    bonus=no
                    {NEW_GOLD_CARRYOVER 0}
                [/endlevel]
            [/else]
        [/if]
    [/event]

    {STORE_UNITS 24 4 23}
    {HERODEATHS}
