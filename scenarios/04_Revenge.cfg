    [event]
        name=prestart
        [objectives]
            [objective]
                description= _ "Defeat the orcish leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Destruction of Malica"
                condition=lose
            [/objective]
            [objective]
                description= _ "Destruction of Poet"
                condition=lose
            [/objective]

            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=60
            [/gold_carryover]
        [/objectives]

        [recall]
            side=1
            id=Poet
        [/recall]

        {MODIFY_UNIT (id=Orc) max_moves 1}
    [/event]

    [event]
        name=start
        [message]
            speaker=Poet
            message= _ "We have arrived, and from somewhere the smell of humans arises."
        [/message]
        [message]
            speaker=Malica
            message= _ "We must go forward."
        [/message]
        [message]
            speaker=Poet
            message= _ "You've seem to have become our leader, my Princess, but I wish you were stronger..."
        [/message]
        [message]
            speaker=Malica
            message= _ "I'm sorry."
        [/message]
        [message]
            speaker=Poet
            message= _ "Do not apologize! You must lead us, I will conceal your weakness."
        [/message]
        [message]
            speaker=Malica
            message= _ "I'm so... Yes... I will!"
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            x=8,9,10,11
            y=1,2,1,2
        [/filter]
        [message]
            speaker=Poet
            message= _ "Oh... here is a poor elf."
        [/message]

        [remove_item]
            x=8
            y=1
        [/remove_item]

        [unit]
            side=1
            x=9
            y=2
            id=Cyclos
            type=Elvish Hero
            name= _ "Cyclos"
            profile=portraits/cyclos.png
            [modifications]
                {TRAIT_LOYAL_HERO}
                {TRAIT_QUICK}
            [/modifications]
        [/unit]

        [message]
            speaker=Cyclos
            message= _ "You undead... are you with the orcs?"
        [/message]
        [message]
            speaker=Malica
            message= _ "Oh, a bandit!"
        [/message]
        [message]
            speaker=Cyclos
            message= _ "... This is the first time I have been mistaken for a bandit."
        [/message]
        [message]
            speaker=Poet
            message= _ "Um, please forget what she said. Still, we shall kill you, then go kill these orcs."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "Kill me! I came here prepared for death, but, orcs are my enemies too. How about make a trade between us?"
        [/message]
        [message]
            speaker=Poet
            message= _ "A trade? You are joking... There is nothing you, a captive, have that we want."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "You are fighting the orcs, aren't you? Their defense at the front is strong and will be difficult to break. I know a secret passage."
        [/message]
        [message]
            speaker=Poet
            message= _ "Hm... The orcs like secret passages. What do you want in return?"
        [/message]
        [message]
            speaker=Cyclos
            message= _ "The orcs have kidnapped the shamans of my village and have imprisoned them somewhere in this cave... Help me free them."
        [/message]
        [message]
            speaker=Poet
            message= _ "It would be ridiculous to try to rescue the shamans. No, your life is at an end."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "My life is unimportant compared to theirs. If you hurt one of them, I will kill you all."
        [/message]
        [message]
            speaker=Poet
            message= _ "Another joke! You have balls. I shall kill you now!"
        [/message]
        [message]
            speaker=Cyclos
            message= _ "Do so if you can, but you will never defeat the orcs."
        [/message]
        [message]
            speaker=Malica
            message= _ "Poet! You elf! Stop! The orcs are certainly stronger than us and a frontal attack will not succeed. I promise we will not hurt your shamans. Now lead us to the secret passage."
        [/message]
        [message]
            speaker=Poet
            message= _ "And I still demand your life."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "Agreed. My life is worth their rescue."
        [/message]
        [message]
            speaker=Malica
            message= _ "You underestimate the value of your life. And what is your name? I am Malica and this is Poet."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "My name is Cyclos."
        [/message]
        [message]
            speaker=Malica
            message= _ "Cyclos, fitting name. Sorry I mistook you for a bandit. By the way, why are you looking at me so seriously?"
        [/message]
        [message]
            speaker=Cyclos
            message= _ "Sorry. I saw woman undead for the first time. And you're wearing a rare necklace."
        [/message]
        [message]
            speaker=Malica
            message= _ "Ah, it's my mother's earring... But I have no longer ears. So, Poet made it to necklace."
        [/message]
        [message]
            speaker=Malica
            message= _ "Oh, we must harry! Let's go."
        [/message]
        [message]
            speaker=narrator
            message= _ "And thus Cyclos joined Malica's fighters."
            image=wesnoth-icon.png
        [/message]

        [set_variable]
            name=turn_stored
            value=$turn_number
        [/set_variable]
        [set_variable]
            name=turn_stored
            add=2
        [/set_variable]

        [objectives]
            [objective]
                description= _ "Defeat the orcish leader"
                condition=win
            [/objective]
            [objective]
                description= _ "Destruction of Malica"
                condition=lose
            [/objective]
            [objective]
                description= _ "Destruction of Poet"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Cyclos"
                condition=lose
            [/objective]

            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=60
            [/gold_carryover]
        [/objectives]

        [if]
            [variable]
                name=set_passage_flag
                equals=1
            [/variable]
            [then]
                [message]
                    speaker=Cyclos
                    message= _ "Here is the secret passage!"
                [/message]

                [terrain]
                    x=21,22,23,24,25,21,22,23,24,25,26,26,27,27,27
                    y=8,8,8,8,8,7,7,7,7,9,8,9,8,9,10
                    terrain=Ur
                [/terrain]

                {GENERIC_UNIT 2 (Orcish Warrior) 22 7} {GUARDIAN}
                {GENERIC_UNIT 2 (Orcish Grunt) 22 8} {GUARDIAN}

                {SHAMANS}

                [message]
                    speaker=Cyclos
                    message= _ "I have found you! But... where is Loana?"
                [/message]

                [role]
                    role=Shaman
                    type=Elvish Shaman
                [/role]

                [message]
                    role=Shaman
                    message= _ "Ah, my Lord... The higher shamans like Loana have been taken away by soldiers of Wesnoth."
                [/message]
                [message]
                    speaker=Cyclos
                    message= _ "No way! No..."
                [/message]
                [message]
                    speaker=Malica
                    message= _ "..."
                [/message]
            [/then]
        [/if]
    [/event]

    {ON_SIGHTING () 1 id=Orcs (
        [if]
            [have_unit]
                id=Cyclos
            [/have_unit]
            [else]
                [message]
                    speaker=unit
                    message= _ "Here! Chief of enemies!"
                [/message]

                [scroll_to_unit]
                    id=Orc
                [/scroll_to_unit]

                [message]
                    speaker=Orc
                    message= _ "Ha, you poor undead! Can you catch me?"
                [/message]
                [message]
                    speaker=Poet
                    message= _ "Damn! We must find another way."
                    scroll=no
                [/message]

                {QUAKE (rumble.ogg)}

                [terrain]
                    x=21,21,22,22,22
                    y=13,14,12,13,14
                    terrain=Qxu
                [/terrain]

                [kill]
                    x=21,21,22,22,22
                    y=13,14,12,13,14
                    fire_event=no
                    animate=yes
                [/kill]
            [/else]
        [/if]
    )}

    [event]
        name=moveto
        [filter]
            side=1
            x=15,16,15,14
            y=6,6,7,7
        [/filter]
        [unit]
            side=1
            x=15
            y=7
            id=Runt
            type=Troll Whelp
            name= _ "Runt"
            unrenamable=yes
            [modifications]
                {TRAIT_LOYAL_HERO}
                {TRAIT_QUICK}
            [/modifications]
        [/unit]
        [message]
            speaker=Poet
            message= _ "There is a troll runt in a cage."
        [/message]
        [message]
            speaker=Malica
            message= _ "That is sad... Free him."
        [/message]

        [remove_item]
            x=14
            y=7
        [/remove_item]

        [message]
            speaker=Poet
            message= _ "Oh, it's going to join us. Well, it needs a name, so let's call it... Runt."
        [/message]
        [message]
            speaker=narrator
            message= _ "And thus Runt joined Malica's fighters. If Runt dies, you lose!"
            image=wesnoth-icon.png
        [/message]
    [/event]

    [event]
        name=new turn
        first_time_only=no
        [if]
            [variable]
                name=turn_number
                numerical_equals=$turn_stored
            [/variable]
            [then]
                [unit]
                    side=3
                    id=Stella
                    type=Elvish Marksman
                    name= _ "Stella"
                    gender=female
                    x,y=4,6
                    find_vacant=yes
                    canrecruit=yes
                    [modifications]
                        {TRAIT_LOYAL_HERO}
                        {TRAIT_DEXTROUS}
                    [/modifications]
                [/unit]

                [clear_variable]
                    name=turn_stored
                [/clear_variable]

                {GENERIC_UNIT 3 (Elvish Archer) 3 6}
                {GENERIC_UNIT 3 (Elvish Archer) 4 4}
                {GENERIC_UNIT 3 (Elvish Archer) 1 4}
                {GENERIC_UNIT 3 (Elvish Archer) 2 4}
                {GENERIC_UNIT 3 (Elvish Fighter) 4 5}
                {GENERIC_UNIT 3 (Elvish Fighter) 3 4}
                {GENERIC_UNIT 3 (Elvish Fighter) 3 5}
                {GENERIC_UNIT 3 (Elvish Fighter) 1 5}
                {GENERIC_UNIT 3 (Elvish Fighter) 1 3}
                {GENERIC_UNIT 3 (Elvish Fighter) 2 2}

                [redraw][/redraw]

                [scroll_to]
                    x,y=4,6
                [/scroll_to]

                [message]
                    speaker=Stella
                    message= _ "My Lord! I'm glad you are safe and sound."
                [/message]
                [message]
                    speaker=Cyclos
                    message= _ "Oh, Stella!"
                [/message]
                [message]
                    speaker=Stella
                    message= _ "Why are you acting in concert with these undead?"
                [/message]
                [message]
                    speaker=Cyclos
                    message= _ "I will tell you later... Let's first slaughter these orcs."
                [/message]
                [message]
                    speaker=Stella
                    message= _ "I'm ready."
                [/message]

                [modify_side]
                    side=3
                    hidden=no
                    {INCOME 10 8 6}
                [/modify_side]

                [objectives]
                    [objective]
                        description= _ "Defeat the orcish leader"
                        condition=win
                    [/objective]
                    [objective]
                        description= _ "Destruction of Malica"
                        condition=lose
                    [/objective]
                    [objective]
                        description= _ "Destruction of Poet"
                        condition=lose
                    [/objective]
                    [objective]
                        description= _ "Death of Cyclos"
                        condition=lose
                    [/objective]
                    [objective]
                        description= _ "Death of Stella"
                        condition=lose
                    [/objective]

                    {TURNS_RUN_OUT}

                    [gold_carryover]
                        bonus=yes
                        carryover_percentage=60
                    [/gold_carryover]
                [/objectives]
            [/then]
        [/if]
    [/event]

    [event]
        name=moveto
        [filter]
            x,y=8,3
        [/filter]
        [message]
            speaker=Poet
            message= _ "What luck, the orcs' gold!"
            scroll=no
        [/message]
        [sound]
            name=gold.ogg
        [/sound]
        [gold]
            side=$side_number
            amount=160
        [/gold]
        [remove_item]
            x=8
            y=3
        [/remove_item]
    [/event]
    [event]
        name=moveto
        [filter]
            x,y=30,14
        [/filter]
        [message]
            speaker=Poet
            message= _ "Good fortune, gold!"
            scroll=no
        [/message]
        [sound]
            name=gold.ogg
        [/sound]
        [gold]
            side=$side_number
            amount=240
        [/gold]
        [remove_item]
            x=30
            y=14
        [/remove_item]
    [/event]

    [event]
        name=moveto
        [filter]
            x=26,27
            y=7,7
            side=1
        [/filter]
        [if]
            [have_unit]
                id=Cyclos
            [/have_unit]
            [then]
                [message]
                    speaker=unit
                    message= _ "Here is the secret passage!"
                [/message]

                [terrain]
                    x=21,22,23,24,25,21,22,23,24,25,26,26,27,27,27
                    y=8,8,8,8,8,7,7,7,7,9,8,9,8,9,10
                    terrain=Ur
                [/terrain]

                {SHAMANS}

                [message]
                    speaker=Cyclos
                    message= _ "I have found you! But... where is Loana?"
                [/message]

                [role]
                    role=Shaman
                    type=Elvish Shaman
                [/role]

                [message]
                    role=Shaman
                    message= _ "Ah, my Lord... The higher shamans like Loana have been taken away by soldiers of Wesnoth."
                [/message]
                [message]
                    speaker=Cyclos
                    message= _ "No way! No..."
                [/message]
                [message]
                    speaker=Malica
                    message= _ "..."
                [/message]
            [/then]
            [else]
                [message]
                    speaker=Malica
                    message= _ "I think there might be a secret passage... but I can't find."
                    scroll=no
                [/message]
                [set_variable]
                    name=set_passage_flag
                    value=1
                [/set_variable]
            [/else]
        [/if]
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            x,y=30,8
        [/filter]
        [message]
            speaker=Malica
            message= _ "Why have the orcs hidden this sword here?"
            scroll=no
        [/message]
        [message]
            speaker=Poet
            message= _ "It has a power of darkness. It is useful to those who dwell in the darkness, but it harms those who live in light. Perhaps human mages hate it and so have hidden it."
            scroll=no
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            type=Orcish Ruler
        [/filter]
        [message]
            speaker=second_unit
            message= _ "Here is the secret passage!"
        [/message]
        [terrain]
            x=29,30
            y=16,15
            terrain=Ur
        [/terrain]
    [/event]

    [event]
        name=last breath
        [filter]
            id=Orc
        [/filter]
        [message]
            speaker=Malica
            message= _ "Tell me why you killed my Dad, and pursued me."
            scroll=no
        [/message]
        [message]
            speaker=Cyclos
            message= _ "Tell me where you have taken Loa... the shamans."
            scroll=no
        [/message]
        [message]
            speaker=Orc
            message= _ "I cannot answer because I have sworn to secrecy."
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            id=Orc
        [/filter]
        [message]
            speaker=Malica
            message= _ "So, he has died... Again I have failed to find the answer."
        [/message]
        [message]
            speaker=Poet
            message= _ "Secrecy? Ha, my Princess, what do we do now?"
        [/message]
        [message]
            speaker=Malica
            message= _ "All I know is that the king is involved. There is no alternative; we must go to the capital."
        [/message]
        [message]
            speaker=Poet
            message= _ "Don't you think to escape somewhere to live in peace? Good, I'll follow you anywhere."
        [/message]
        [message]
            speaker=Poet
            message= _ "Oh, I forgot. Hey, you elvish kid."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "I know. My life is yours."
        [/message]
        [message]
            speaker=Poet
            message= _ "Yeah! It has been too long since I last killed an elf."
        [/message]
        [message]
            speaker=Malica
            message= _ "Stop! Poet, such jesting is unseemly. Cyclos, do you really not regret dying now?"
        [/message]
        [message]
            speaker=Cyclos
            message= _ "I made the agreement."
        [/message]
        [message]
            speaker=Malica
            message= _ "By this agreement, we cannot kill you until we save all the elvish shamans. And you are still obligated to aid us."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "I will be your shield... good."
        [/message]
        [message]
            speaker=Poet
            message= _ "Damn!"
        [/message]
        [message]
            speaker=Stella
            message= _ "Cyclos! I will follow you."
        [/message]
        [message]
            speaker=Cyclos
            message= _ "Stella, you must return with these shamans so our village will endure."
        [/message]
        [message]
            speaker=Stella
            message= _ "Ah..."
        [/message]
        [message]
            speaker=Malica
            message= _ "... Stella, come with us. It never hurts to have more allies."
        [/message]
        [message]
            speaker=Stella
            message= _ "I will go not for you, but for my Lord!"
        [/message]
        [message]
            speaker=Malica
            message= _ "All right."
        [/message]

        {MODIFY_UNIT (side=3) side 1}

        [modify_unit]
            [filter]
                id=Stella
            [/filter]
            canrecruit=no
        [/modify_unit]

        [if]
            [have_unit]
                id=Runt
            [/have_unit]
            [then]
                [message]
                    speaker=Poet
                    message= _ "Elves have joined us, a troll runt comes with us. What next?"
                [/message]
            [/then]
            [else]
                [message]
                    speaker=Poet
                    message= _ "Elves have joined us... What next?"
                [/message]
            [/else]
        [/if]

        [role]
            role=Shaman
            type=Elvish Shaman
        [/role]

        [message]
            role=Shaman
            message= _ "Cyclos, Stella, we are returning to our village. We hope you are successful and come back safely."
        [/message]

        [kill]
            type=Elvish Shaman
            fire_event=no
            animate=no
        [/kill]

        [if]
            [have_unit]
                id=Runt
            [/have_unit]
            [else]
                [unit]
                    side=1
                    x=15
                    y=7
                    id=Runt
                    type=Troll Whelp
                    name= _ "Runt"
                    unrenamable=yes
                    [modifications]
                        {TRAIT_LOYAL_HERO}
                        {TRAIT_QUICK}
                    [/modifications]
                [/unit]
                [message]
                    speaker=Poet
                    message= _ "There is a troll runt in a cage."
                [/message]
                [message]
                    speaker=Malica
                    message= _ "That is sad... Free him."
                [/message]

                [remove_item]
                    x=14
                    y=7
                [/remove_item]

                [message]
                    speaker=Poet
                    message= _ "Oh, it's going to join us. Well, it needs a name, so let's call it... Runt."
                [/message]
                [message]
                    speaker=narrator
                    message= _ "And thus Runt joined Malica's fighters."
                    image=wesnoth-icon.png
                [/message]
            [/else]
        [/if]
        [endlevel]
            result=victory
            bonus=yes
            {NEW_GOLD_CARRYOVER 60}
        [/endlevel]
    [/event]

    {HERODEATHS}
[/scenario]
