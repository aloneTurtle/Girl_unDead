    # 呪術師のゾンビ化
    [event]
        name=die
        first_time_only=no
        [filter]
            type=Elvish Druid,Elvish Shyde
        [/filter]
        [unit]
            type=Soulless
            overwrite=yes
            animate=yes
            side=$unit.side
            id=$unit.id
            x,y=$x1,$y1
            find_vacant=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
    [/event]

    # 呪術師のランダムなゾンビ化
    [event]
        name=new turn
        first_time_only=no
        [if]
            [have_unit]
                id=Shaman 01,Shaman 02,Shaman 03,Shaman 04,Shaman 05,Shaman 06,Shaman 07,Shaman 08,Shaman 09,Shaman 10,Shaman 11,Shaman 12,Shaman 13,Shaman 14,Shaman 15
