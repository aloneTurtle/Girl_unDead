#textdomain wesnoth-Girl_unDead

[unit_type]
    id=Malica
    name= _ "Malica"
    race=human
    gender=female
    image="units/human-peasants/malica.png"
    profile="portraits/malica.png"
    hitpoints=16
    movement_type=smallfoot
    movement=5
    experience=25
    level=0
    alignment=lawful
    advances_to=null
    {AMLA_DEFAULT}
    cost=6
    description= _ "Young and fragile, children are easily finished."
    die_sound={SOUND_LIST:HUMAN_FEMALE_DIE}
    [defend]
        hits=miss
        [frame]
            begin=-126
            end=-125
            image="units/human-peasants/malica.png"
        [/frame]
        [frame]
            begin=-125
            end=125
            image="units/human-peasants/malica-defend-1.png"
        [/frame]
        [frame]
            begin=125
            end=126
            image="units/human-peasants/malica-defend-2.png"
        [/frame]
    [/defend]
    [defend]
        hits=kill
        [frame]
            begin=-126
            end=-125
            image="units/human-peasants/malica.png"
        [/frame]
        [frame]
            begin=-125
            end=125
            image="units/human-peasants/malica-defend-1.png"
        [/frame]
        [frame]
            begin=125
            end=126
            image="units/human-peasants/malica-defend-2.png"
        [/frame]
    [/defend]
    [defend]
        hits=hit
        [frame]
            begin=-126
            end=-125
            image="units/human-peasants/malica.png"
        [/frame]
        [frame]
            begin=-125
            end=125
            image="units/human-peasants/malica-defend-1.png"
            sound={SOUND_LIST:HUMAN_FEMALE_HIT}
        [/frame]
        [frame]
            begin=125
            end=126
            image="units/human-peasants/malica-defend-2.png"
        [/frame]
    [/defend]
    [attack]
        name=small knife
        description= _ "small knife"
        icon=attacks/dagger-human.png
        type=blade
        range=melee
        damage=4
        number=2
    [/attack]
    [attack_anim]
        [filter_attack]
            name=small knife
        [/filter_attack]
        [if]
            hits=yes
            [frame]
                begin=-150
                end=-100
                image="units/human-peasants/malica.png"
            [/frame]
            [frame]
                begin=-100
                end=100
                image="units/human-peasants/malica-melee.png"
                sound=dagger-swish.wav
            [/frame]
            [frame]
                begin=100
                end=150
                image="units/human-peasants/malica.png"
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-150
                end=-100
                image="units/human-peasants/malica.png"
            [/frame]
            [frame]
                begin=-100
                end=100
                image="units/human-peasants/malica-melee.png"
                sound=dagger-swish.wav
            [/frame]
            [frame]
                begin=100
                end=150
                image="units/human-peasants/malica.png"
            [/frame]
        [/else]
    [/attack_anim]
[/unit_type]
