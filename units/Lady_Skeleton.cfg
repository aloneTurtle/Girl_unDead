#textdomain wesnoth-Girl_unDead

[unit_type]
    id=Lady Skeleton
    name= _ "Lady Skeleton"
    race=undead
    gender=female
    image="units/undead/malica+skeleton.png"
    halo="halo/elven/nature-halo[7~1].png~CS(-159,-255,-159)~O(0.5):250"
    profile="portraits/malica-dead.png"
    hitpoints=32
    movement_type=undeadfoot
    movement=5
    experience=34
    level=1
    alignment=chaotic
    advances_to=Lady Prelich
    cost=14
    usage=fighter
    #textdomain wesnoth-units
    description= _ "Skeletons are warriors who have been slain in battle and brought back by dark magics. Nearly mindless, and unwavering in their purpose, they fear neither pain, nor death, and their mere presence will often frighten away any who would challenge their master."
    #textdomain wesnoth-Girl_unDead
    die_sound={SOUND_LIST:SKELETON_DIE}
    [abilities]
        {ABILITY_SUBMERGE}
        {ABILITY_HEALS}
    [/abilities]
    [recruit_anim]
        [frame]
            begin=-200
            end=100
            image="units/undead/malica+skeleton-defend-2.png"
            alpha="0~1:300"
        [/frame]
        [frame]
            begin=100
            end=200
            image="units/undead/malica+skeleton-defend-1.png"
        [/frame]
        [frame]
            begin=200
            end=300
            image="units/undead/malica+skeleton.png"
        [/frame]
    [/recruit_anim]
    [defend]
        hits=miss
        [frame]
            begin=-126
            end=-125
            image="units/undead/malica+skeleton.png"
        [/frame]
        [frame]
            begin=-125
            end=125
            image="units/undead/malica+skeleton-defend-1.png"
        [/frame]
        [frame]
            begin=125
            end=126
            image="units/undead/malica+skeleton-defend-2.png"
        [/frame]
    [/defend]
    [defend]
        hits=kill
        [frame]
            begin=-126
            end=-125
            image="units/undead/malica+skeleton.png"
        [/frame]
        [frame]
            begin=-125
            end=125
            image="units/undead/malica+skeleton-defend-1.png"
        [/frame]
        [frame]
            begin=125
            end=126
            image="units/undead/malica+skeleton-defend-2.png"
        [/frame]
    [/defend]
    [defend]
        hits=hit
        [frame]
            begin=-126
            end=-125
            image="units/undead/malica+skeleton.png"
        [/frame]
        [frame]
            begin=-125
            end=125
            image="units/undead/malica+skeleton-defend-1.png"
            sound={SOUND_LIST:SKELETON_HIT}
        [/frame]
        [frame]
            begin=125
            end=126
            image="units/undead/malica+skeleton-defend-2.png"
        [/frame]
    [/defend]
    [resistance]
        blade=60
        pierce=40
        impact=120
    [/resistance]
    [attack]
        name=knife
        description= _ "knife"
        icon=attacks/dagger-undead.png
        type=blade
        range=melee
        damage=6
        number=3
        [specials]
            {WEAPON_SPECIAL_DRAIN}
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
    [/attack]
    [attack]
        name=entangle
        #textdomain wesnoth-units
        description=_"entangle"
        #textdomain wesnoth-Girl_unDead
        type=impact
        [specials]
            {WEAPON_SPECIAL_SLOW}
            {WEAPON_SPECIAL_MAGICAL}
        [/specials]
        damage=4
        number=2
        range=ranged
    [/attack]
    [attack_anim]
        [filter_attack]
            name=knife
        [/filter_attack]
        [if]
            hits=yes
            [frame]
                begin=-150
                end=-100
                image="units/undead/malica+skeleton.png"
            [/frame]
            [frame]
                begin=-100
                end=100
                image="units/undead/malica+skeleton-melee.png"
                sound=dagger-swish.wav
            [/frame]
            [frame]
                begin=100
                end=150
                image="units/undead/malica+skeleton.png"
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-150
                end=-100
                image="units/undead/malica+skeleton.png"
            [/frame]
            [frame]
                begin=-100
                end=100
                image="units/undead/malica+skeleton-melee.png"
                sound=dagger-swish.wav
            [/frame]
            [frame]
                begin=100
                end=150
                image="units/undead/malica+skeleton.png"
            [/frame]
        [/else]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=entangle
        [/filter_attack]
        [if]
            hits=yes
            [frame]
                begin=-150
                end=-100
                image="units/undead/malica+skeleton.png"
            [/frame]
            [frame]
                begin=-100
                end=100
                image="units/undead/malica+skeleton-melee.png"
                sound=dagger-swish.wav
            [/frame]
            [frame]
                begin=100
                end=150
                image="units/undead/malica+skeleton.png"
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                begin=-150
                end=-100
                image="units/undead/malica+skeleton.png"
            [/frame]
            [frame]
                begin=-100
                end=100
                image="units/undead/malica+skeleton-melee.png"
                sound=dagger-swish.wav
            [/frame]
            [frame]
                begin=100
                end=150
                image="units/undead/malica+skeleton.png"
            [/frame]
        [/else]
    [/attack_anim]
[/unit_type]
